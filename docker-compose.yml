services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: recover
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-recover}
      POSTGRES_DB: recover
    volumes:
      - recover-db:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5434:5432" # host-side tooling (drizzle-kit, psql); not exposed on LAN
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U recover -d recover"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    # Prebuilt image (amd64/arm64). To build from source instead:
    #   docker compose -f docker-compose.yml -f docker-compose.build.yml up -d --build
    image: ghcr.io/crunchynapkin404/recover:latest
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.scope=recover"
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgres://recover:${POSTGRES_PASSWORD:-recover}@db:5432/recover
      DATABASE_DRIVER: pg
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?set in .env — 64 hex chars}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?set in .env}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      OWNER_EMAIL: ${OWNER_EMAIL:-}
      OWNER_PASSWORD: ${OWNER_PASSWORD:-}
      TRUSTED_ORIGINS: ${TRUSTED_ORIGINS:-}
      CRON_SECRET: ${CRON_SECRET:-}
      STRAVA_CLIENT_ID: ${STRAVA_CLIENT_ID:-}
      STRAVA_CLIENT_SECRET: ${STRAVA_CLIENT_SECRET:-}
    depends_on:
      db:
        condition: service_healthy

  # Nightly pg_dump to the recover-backups volume, 14-dump rotation.
  # Deliberately default-on (no profile): forgetting a profile flag must
  # not mean having no backups. Drill: scripts/restore-drill.sh
  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      PGHOST: db
      PGUSER: recover
      PGPASSWORD: ${POSTGRES_PASSWORD:-recover}
      PGDATABASE: recover
      BACKUP_KEEP: ${BACKUP_KEEP:-14}
    volumes:
      - recover-backups:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    # Install the crontab at start, then run busybox crond in the foreground.
    command: sh -c 'echo "30 3 * * * sh /backup.sh" | crontab - && crond -f -l 8'
    depends_on:
      db:
        condition: service_healthy

  # Optional public ingress: docker compose --profile tunnel up -d
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    profiles: ["tunnel"]
    command: tunnel run --token ${CLOUDFLARED_TOKEN:-}
    depends_on:
      - app

  # Auto-update: polls GHCR every 5 min, restarts app on new image
  watchtower:
    image: containrrr/watchtower:latest
    restart: unless-stopped
    profiles: ["autoupdate"]
    environment:
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: "300"
      WATCHTOWER_SCOPE: recover
      DOCKER_API_VERSION: "1.43"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      - "com.centurylinklabs.watchtower.scope=recover"

volumes:
  recover-db:
  recover-backups:
